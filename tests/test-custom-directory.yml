name: Test custom directory and targets
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: workflow_dispatch
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up test project with ESLint in custom directory
        run: |
          mkdir -p /tmp/custom-dir-project/src
          cd /tmp/custom-dir-project
          cat > package.json << 'EOF'
          {
            "name": "test-project",
            "version": "1.0.0",
            "private": true
          }
          EOF
          npm install --save-dev eslint@9 2>&1 | tail -5
          # Create a flat config file for ESLint 9
          cat > eslint.config.js << 'EOF'
          export default [
            {
              rules: {
                "no-console": "warn"
              }
            }
          ];
          EOF
          # Create clean JS files in src directory
          cat > src/index.js << 'EOF'
          const value = 1 + 1;
          module.exports = value;
          EOF

      - name: Run ESLint action with custom directory and targets
        id: action
        uses: .
        with:
          request-changes: 'false'
          fail-check: 'false'
          github-token: 'fake-token-for-non-pr-event'
          directory: '/tmp/custom-dir-project'
          targets: 'src'
          eslint-lib-path: './node_modules/eslint/lib/api.js'

      - name: Assert action completed
        run: |
          echo "Action completed with custom directory and targets"
          echo "PASS"
