name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: workflow_dispatch
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up ESLint project
        run: |
          mkdir -p /tmp/eslint-project
          cd /tmp/eslint-project
          cat > package.json <<'EOF'
          {
            "name": "eslint-test-fixture",
            "version": "1.0.0",
            "type": "module"
          }
          EOF
          npm install eslint@latest --save-dev --quiet
          # Create a minimal flat config
          cat > eslint.config.js <<'EOF'
          export default [];
          EOF
          # Create a simple JS file to lint
          cat > index.js <<'EOF'
          const x = 1;
          export default x;
          EOF

      - id: action
        uses: .
        with:
          github-token: ${{ github.token }}
          directory: /tmp/eslint-project
          targets: index.js
          eslint-lib-path: ./node_modules/eslint/lib/api.js
          request-changes: false
          fail-check: false

      - name: Assert action completed successfully
        run: |
          echo "Action completed without error"
          echo "PASS"
